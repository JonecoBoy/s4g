<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.SiteTitle}} | {{.Page.Title}}</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f13;
            color: #e2e8f0;
            min-height: 100vh;
        }

        header {
            border-bottom: 1px solid #1e1e2e;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        header .logo {
            font-weight: 800;
            font-size: 1.25rem;
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        main {
            max-width: 760px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        main h1 {
            font-size: 2.25rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            color: #f8fafc;
        }

        main h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 2rem 0 0.75rem;
            color: #cbd5e1;
        }

        main p {
            line-height: 1.8;
            color: #94a3b8;
            margin-bottom: 1rem;
        }

        main a {
            color: #7c3aed;
            text-decoration: underline;
        }

        main ul,
        main ol {
            padding-left: 1.5rem;
            color: #94a3b8;
            line-height: 1.8;
            margin-bottom: 1rem;
        }

        main code {
            background: #1e1e2e;
            border: 1px solid #2d2d3f;
            padding: 0.1em 0.4em;
            border-radius: 4px;
            font-size: 0.875em;
        }

        main pre {
            background: #1e1e2e;
            border: 1px solid #2d2d3f;
            padding: 1.25rem;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1rem;
        }

        main pre code {
            background: none;
            border: none;
            padding: 0;
        }

        nav {
            margin-top: 0.25rem;
            display: flex;
            gap: 1.5rem;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.95rem;
        }

        nav a:hover {
            color: #f8fafc;
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.8rem;
            color: #475569;
            border-top: 1px solid #1e1e2e;
            margin-top: 4rem;
        }
    </style>
</head>

<body>
    <header>
        <span class="logo">⚡ {{.SiteTitle}}</span>
        <nav>
            <a href="/home/arch/Dev/s4g/dist/index.html">Home</a>
            <a href="/home/arch/Dev/s4g/dist/about.html">About</a>
            <a href="/home/arch/Dev/s4g/dist/notes.html">Notes</a>
        </nav>
    </header>
    <main>
        {{block "content" .}}{{end}}
    </main>
    <footer>built with s4g — super simple static site generator</footer>
</body>

</html>
